<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoxFight Arena</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        margin: 0;
        overflow: hidden;
        background: #8fc9ff;
      }

      body {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        overscroll-behavior: none;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
